<div class="grid column3">
  {% for post in include.posts %}
    <a href="{{ post.url }}">
    {%if post.category != "animation"%}
    <img width="100%" src="/assets/images/portfolio/{{post.category}}/thumbs/{{post.thumbnail}}"/>
    {% else %}
    <video width="100%" loop autoplay>
      <source src="/assets/images/portfolio/{{post.category}}/thumbs/{{post.thumbnail}}" type="video/webm">
    </video>
    {% endif %}
    </a>
  {% endfor %}
</div>
