---
layout: default
---

<div class="navigation">
	<a id="navPrev" class="{% unless page.previous %}disabled{% endunless %}" href="{{page.previous.url}}">Previous</a>
    ·
	<a id="navNext" class="{% unless page.next %}disabled{% endunless %}" href="{{page.next.url}}">Next</a>
</div>

<br>
<br>
<br>

{% assign col = "" %}
{% assign len = page.filename | size %}
{% if len > 1 %}{% assign col = 2 %}{% endif %}

<div class="grid column{{col}}">
	{% for filename in page.filename%}
	{%if page.category != "animation"%}
	<img class="img-details" src="/assets/images/portfolio/{{page.category}}/{{filename}}"/>
	{% else %}
	<video class="img-details" loop autoplay muted playsinline>
		<source src="/assets/images/portfolio/{{page.category}}/{{filename}}" type="video/mp4">
	</video>
	{% endif %}
	{% endfor %}
</div>
